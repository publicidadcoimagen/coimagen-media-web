  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!--
      Jotform AI Agent embed — loaded AFTER root so React mounts first.
      The MutationObserver below watches for the Jotform floating widget and
      snaps it to bottom-LEFT so it doesn't overlap WhatsApp (bottom-right).
    -->
    <script>
      (function () {
        var JOTFORM_KEYWORDS = ['jotform', 'jf-agent', 'jf_agent', 'jfagent', 'JFChatBot'];

        function isJotformEl(el) {
          var id = (el.id || '').toLowerCase();
          var cls = (el.className && typeof el.className === 'string' ? el.className : '').toLowerCase();
          var src = (el.src || '').toLowerCase();
          return JOTFORM_KEYWORDS.some(function (k) {
            return id.indexOf(k.toLowerCase()) !== -1 ||
              cls.indexOf(k.toLowerCase()) !== -1 ||
              src.indexOf(k.toLowerCase()) !== -1;
          });
        }

        function snapToLeft(el) {
          var computed = window.getComputedStyle(el);
          if (computed.position !== 'fixed') {
            // Check parent
            if (el.parentElement) snapToLeft(el.parentElement);
            return;
          }
          el.style.setProperty('right', 'auto', 'important');
          el.style.setProperty('left', '24px', 'important');
          el.style.setProperty('bottom', '24px', 'important');
          el.style.setProperty('top', 'auto', 'important');
        }

        function scanAndReposition() {
          // Scan all body descendants for Jotform elements
          document.querySelectorAll('body *').forEach(function (el) {
            if (isJotformEl(el)) {
              snapToLeft(el);
            }
          });

          // Also scan direct body children that are fixed-positioned and
          // NOT the React root — these are likely widget injections
          var root = document.getElementById('root');
          Array.from(document.body.children).forEach(function (el) {
            if (el === root || el.tagName === 'SCRIPT' || el.tagName === 'STYLE') return;
            var pos = window.getComputedStyle(el).position;
            if (pos === 'fixed') {
              snapToLeft(el);
            }
          });
        }

        // Watch DOM for Jotform injection
        var observer = new MutationObserver(function (mutations) {
          var needsScan = mutations.some(function (m) {
            return m.addedNodes.length > 0;
          });
          if (needsScan) scanAndReposition();
        });

        // Start observing once body is ready
        function startObserver() {
          observer.observe(document.body, { childList: true, subtree: true });
        }

        if (document.body) {
          startObserver();
        } else {
          document.addEventListener('DOMContentLoaded', startObserver);
        }

        // Retry a few times after load in case embed delays injection
        window.addEventListener('load', function () {
          scanAndReposition();
          setTimeout(scanAndReposition, 1000);
          setTimeout(scanAndReposition, 2500);
          setTimeout(scanAndReposition, 5000);
        });
      })();
    </script>

    <!-- Jotform AI Agent embed script (loads after React so it doesn't block render) -->
    <script src='https://cdn.jotfor.ms/agent/embedjs/0199f974e9097a9badd918a3a92c617fc5b7/embed.js'></script>
